version: "3.8"

services:
  nginx:
    image: ghcr.io/nuclearsheep540/rollplay/nginx:${nginx}
    build:
      context: ./docker/prod/nginx
      dockerfile: Dockerfile

  api-game:
    image: ghcr.io/nuclearsheep540/rollplay/api-game:${api_game}
    build:
      context: .
      dockerfile: docker/prod/api-game/Dockerfile

  api-site:
    image: ghcr.io/nuclearsheep540/rollplay/api-site:${api_site}
    build:
      context: .
      dockerfile: docker/prod/api-site/Dockerfile

  api-auth:
    image: ghcr.io/nuclearsheep540/rollplay/api-auth:${api_auth}
    build:
      context: ./api-auth
      dockerfile: ../docker/prod/api-auth/Dockerfile

  app:
    image: ghcr.io/nuclearsheep540/rollplay/rollplay:${app}
    build:
      context: ./rollplay
      dockerfile: ../docker/prod/rollplay/Dockerfile
      args:
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN_NEXTJS}
        SENTRY_ORG: ${SENTRY_ORG}
        SENTRY_PROJECT: ${SENTRY_PROJECT_NEXTJS}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}

  mongo:
    image: ghcr.io/nuclearsheep540/rollplay/db:${mongo}
    build:
      context: ./docker
      dockerfile: prod/db/Dockerfile
      args:
        MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
        MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

  postgres:
    image: ghcr.io/nuclearsheep540/rollplay/postgres:${postgres}
    build:
      context: ./docker
      dockerfile: prod/postgres/Dockerfile
      args:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: rollplay
        APP_DB_USER: ${APP_DB_USER}
        APP_DB_PASSWORD: ${APP_DB_PASSWORD}

  certbot:
    image: ghcr.io/nuclearsheep540/rollplay/certbot:${certbot}
    build:
      context: ./docker/prod/certbot-renewer
      dockerfile: Dockerfile